version: '3.8'

services:
  uptime-monitor:
    build: .
    container_name: aisstream-uptime-monitor
    restart: always
    ports:
      # Expose port 3000 of the container to port 3000 on the host Proxmox VM/LXC
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Pass the API key from the host environment or a .env file located next to docker-compose.yml
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
    volumes:
      # Persist SQLite database using a Docker Named Volume to resolve host permission blocks.
      - ais_database_volume:/usr/src/app/data

volumes:
  ais_database_volume:


