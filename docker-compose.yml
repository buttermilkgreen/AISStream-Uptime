version: '3.8'

services:
  uptime-monitor:
    build: .
    container_name: aisstream-uptime-monitor
    restart: always
    ports:
      # Expose port 3000 of the container to port 3000 on the host Proxmox VM/LXC
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - AISSTREAM_BOUNDING_BOXES=${AISSTREAM_BOUNDING_BOXES}
      - SILENCE_TIMEOUT_SECONDS=${SILENCE_TIMEOUT_SECONDS}
      - SILENCE_TO_DOWN_TIMEOUT_SECONDS=${SILENCE_TO_DOWN_TIMEOUT_SECONDS}
      - API_RATE_LIMIT_RPM=${API_RATE_LIMIT_RPM}
      - API_CACHE_TTL_SECONDS=${API_CACHE_TTL_SECONDS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - DEV=${DEV}
    volumes:
      # Persist SQLite database using a Docker Named Volume to resolve host permission blocks.
      - ais_database_volume:/usr/src/app/data

volumes:
  ais_database_volume:


