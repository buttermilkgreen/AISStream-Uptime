version: '3.8'

services:
  uptime-monitor:
    build: .
    container_name: aisstream-uptime-monitor
    restart: always
    ports:
      # If BIND_IP is not set, it defaults to 127.0.0.1 (secure for VPS)
      - "${BIND_IP:-127.0.0.1}:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - AISSTREAM_BOUNDING_BOXES=${AISSTREAM_BOUNDING_BOXES}
      - SILENCE_TIMEOUT_SECONDS=${SILENCE_TIMEOUT_SECONDS}
      - SILENCE_TO_DOWN_TIMEOUT_SECONDS=${SILENCE_TO_DOWN_TIMEOUT_SECONDS}
      - API_RATE_LIMIT_RPM=${API_RATE_LIMIT_RPM}
      - API_CACHE_TTL_SECONDS=${API_CACHE_TTL_SECONDS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - DEV=${DEV}
    volumes:
      # If DATA_VOLUME_PATH is not set, it defaults to a local './data' folder
      - ${DATA_VOLUME_PATH:-./data}:/usr/src/app/data
    networks:
      - uptime_network

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: always
    profiles:
      - prod
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - uptime_network

networks:
  uptime_network:
    driver: bridge
